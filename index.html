<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scatter Plot Visualizer — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🎯</span>
                <div class="title-col">
                    <h1>Scatter Plot Visualizer</h1>
                    <p class="tagline">Data point matrix plotting coordinate correlations.</p>
                </div>
            </div>
            <div class="badge">data</div>
        </header>

        <main class="workspace-card">
            
            <svg width="200" height="120" style="background:#0c0c14; border-radius:8px; border:1px solid var(--border); display:block; margin:auto;">
                <circle cx="30" cy="80" r="5" fill="cyan" />
                <circle cx="80" cy="40" r="5" fill="cyan" />
                <circle cx="130" cy="60" r="5" fill="cyan" />
                <circle cx="170" cy="20" r="5" fill="cyan" />
            </svg>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
